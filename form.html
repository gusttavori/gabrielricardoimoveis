<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Gabriel Ricardo Imóveis</title>
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/form.css">
</head>
<body>
   
    <div class="form-container">
        <h3>Garanta prioridade e benefícios exclusivos!</h3>
        <p>Preencha seus dados para receber oportunidades direto no seu WhatsApp.</p>

        <form onsubmit="enviarParaWhatsApp(event)">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="tel" id="telefone" placeholder="Telefone" required>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="text" id="interesse" placeholder="Interesse" required>
        <button type="submit">Enviar</button>
        </form>          
    </div>
    
<script src="js/form.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
